# Cloudflare Workers configuration (Static Assets model).
#
# `wrangler deploy` uploads the Worker in worker/index.js together with the
# static site in web/ (served via the ASSETS binding). The Worker handles
# POST /api/ask and serves everything else as a static asset.
#
# Deploy:  npx wrangler deploy
# Secret:  npx wrangler secret put GROQ_API_KEY   (or set it in the dashboard)

name = "easy-python"
main = "worker/index.js"
compatibility_date = "2024-11-01"

[assets]
directory = "./web"
binding = "ASSETS"
